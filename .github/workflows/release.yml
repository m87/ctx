name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set app version
        shell: bash
        run: |
          APP_VERSION="${GITHUB_REF_NAME#v}"
          echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"
          echo "APP_VERSION=${APP_VERSION}"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ./ui
        run: npm ci

      - name: Build UI
        working-directory: ./ui
        run: npm run build -- --configuration production

      - name: Prepare embedded SPA assets
        run: sh ./scripts/prepare-spa-assets.sh

      - name: Download deps
        run: go mod download

      - name: Create GitHub release (binaries and archives)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-release:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set app version
        shell: bash
        run: |
          APP_VERSION="${GITHUB_REF_NAME#v}"
          echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/ctx" >> "$GITHUB_ENV"
          echo "APP_VERSION=${APP_VERSION}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push all-in-one image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.all-in-one
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.APP_VERSION }}-all-in-one
            ${{ env.IMAGE_NAME }}:${{ env.APP_VERSION }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.APP_VERSION }}-server

      - name: Build and push ui image
        uses: docker/build-push-action@v6
        with:
          context: ./ui
          file: ./ui/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.APP_VERSION }}-ui
