version: 2

project_name: ctx

builds:
  - id: ctx
    binary: ctx
    main: ./main.go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: ctx-archive
    ids:
      - ctx
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  disable: true

release:
  draft: false
  prerelease: auto
