version: 2

project_name: ctx

builds:
  - id: ctx-server
    binary: ctx
    main: ./main.go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

  - id: ctx-allinone
    binary: ctx-all-in-one
    main: ./main.go
    tags:
      - allinone
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: ctx-server-archive
    ids:
      - ctx-server
    name_template: "{{ .ProjectName }}_server_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

  - id: ctx-allinone-archive
    ids:
      - ctx-allinone
    name_template: "{{ .ProjectName }}_all-in-one_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  disable: true

release:
  draft: false
  prerelease: auto
